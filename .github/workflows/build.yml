name: Build & Release

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Download portable Python
        run: node ../scripts/download-python.js

      - name: Install Python dependencies
        run: node ../scripts/setup-python-deps.js

      - name: Verify Python environment
        run: |
          ../resources/python/python --version
          ../resources/python/python -c "import fastapi; print('fastapi OK')"

      - name: Generate app icon
        run: node ../scripts/generate-icon.js

      - name: TypeScript type check
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Build Electron app (pack only)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/v')
        run: npx electron-builder --dir --win

      - name: Build & publish Electron app
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Upload setup.exe artifact
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: cli-proxy-setup
          path: desktop/dist/*.exe
          retention-days: 30
