<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';">
  <title>cli-proxy</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <!-- 顶部标题栏 -->
  <header id="titlebar">
    <div class="titlebar-brand">
      <span class="brand-dot" id="titlebar-dot"></span>
      <span class="brand-text">cli-proxy</span>
    </div>
    <div class="titlebar-status">
      <span id="titlebar-status-text">已停止</span>
      <span class="titlebar-sep">·</span>
      <span id="titlebar-port">端口 —</span>
    </div>
  </header>

  <!-- 内容区 -->
  <main id="content">
    <section id="tab-dashboard" class="tab-panel active"></section>
    <section id="tab-providers" class="tab-panel"></section>
    <section id="tab-logs" class="tab-panel"></section>
    <section id="tab-settings" class="tab-panel"></section>
  </main>

  <!-- 底部 Tab 导航 -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-tab="dashboard">
      <span class="nav-icon">📊</span>
      <span class="nav-label">仪表盘</span>
    </button>
    <button class="nav-btn" data-tab="providers">
      <span class="nav-icon">🔌</span>
      <span class="nav-label">供应商</span>
    </button>
    <button class="nav-btn" data-tab="logs">
      <span class="nav-icon">📋</span>
      <span class="nav-label">日志</span>
    </button>
    <button class="nav-btn" data-tab="settings">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">设置</span>
    </button>
  </nav>
</div>

<script src="js/vendor/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/providers.js"></script>
<script src="js/logs.js"></script>
<script src="js/settings.js"></script>

</body>
</html>
