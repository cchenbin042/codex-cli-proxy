appId: com.codex-proxy.desktop
productName: codex-proxy
copyright: Copyright © 2026 codex-proxy

directories:
  output: release

extraResources:
  - from: ../src/
    to: backend/src
    filter:
      - "**/*.py"
      - "!**/__pycache__/**"
      - "!**/*.tsx"
      - "!**/*.ts"
      - "!**/vite-env.d.ts"
      - "!**/components/**"
      - "!**/hooks/**"
      - "!**/lib/**"
  - from: ../config.yaml
    to: backend/config.yaml
  - from: ../requirements.txt
    to: backend/requirements.txt

files:
  - dist/main/**/*.js
  - dist/preload/**/*.js
  - renderer/**/*
  - package.json

asar:
  smartUnpack: false

win:
  target:
    - target: nsis
      arch: [x64]
  icon: renderer/assets/cli-proxy-icon.png

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: renderer/assets/cli-proxy-icon.png
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  icon: renderer/assets/cli-proxy-icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: codex-proxy
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: cchenbin042
  repo: cli-proxy
